      responses:
        '201':
          description: Successfully created shipment.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: "A unique identifier assigned to each shipment, facilitating internal operations such as modifications, system searches, and deletion of shipments. The 'id' serves as a key reference for administrative and logistical processes within the delivery system, allowing precise access and management of shipment records.\nThe format of the `id` depends on the shipment direction (first/last mile):\n  - For EU shipments, the value is a numeric shipment ID (e.g., `754116`) used for search operations.\n  - For UA shipments, the value is a UUID reference (e.g., `56abe014-451c-11f0-a1d5-48df37b921da`) used for search by `ref`.\n"
                    minimum: 1
                  number:
                    type: string
                    description: The transportation document number provided to clients for tracking purposes and accessing printed forms. It also facilitates shipment searches within the system, offering a customer-friendly way to monitor shipment progress. While 'number' is used externally for tracking and documentation, it can also serve internal needs similar to 'id' for identifying shipments in certain system operations.
                    pattern: ^[A-Z]{4}\d{10}$
                  scheduledDeliveryDate:
                    type: string
                    format: date-time
                    description: Estimated delivery date based on routing and service level, subject to change based on logistics and external factors. Date in ISO 8601 format.
                    nullable: true
                    example: '2023-04-14T09:00:00Z'
                  status:
                    type: string
                    description: Current status of the shipment. Initially set to "ReadyToShip" upon creation, indicating it's prepared for dispatch.
                  cost:
                    type: number
                    format: float
                    description: Total cost calculated for the delivery services provided, based on shipment size, weight, destination, and service options selected.
                    example: 31.5
                  parcelsAmount:
                    type: integer
                    description: The total number of parcels included in the shipment. This count helps in logistics planning and tracking.
                    minimum: 1
                  createdAt:
                    type: string
                    format: date-time
                    description: The date-time when the shipment record was created in the system. Date in ISO 8601 format.
                    example: '2023-04-11T10:42:05Z'
                  updatedAt:
                    type: string
                    format: date-time
                    description: The last date-time when the shipment record was updated. Helps in tracking changes and updates made to the shipment details.Date in ISO 8601 format.
                    example: '2023-04-11T10:42:05Z'
                  deletedAt:
                    type: string
                    format: date-time
                    description: The date-time when the shipment was canceled or removed from the system. If not canceled, this field is null.
                    nullable: true
              examples:
                parcelResponse:
                  summary: Shipment response for parcel
                  value:
                    id: 113677
                    number: SHLT4009860665
                    scheduledDeliveryDate: '2023-04-14T09:00:00.000000Z'
                    status: ReadyToShip
                    cost: 31
                    parcelsAmount: 1
                    createdAt: '2023-04-11T10:42:05.543380Z'
                    updatedAt: '2023-04-11T10:42:05.543380Z'
                    deletedAt: null
                palletResponse:
                  summary: Shipment response for pallet
