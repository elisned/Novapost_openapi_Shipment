      summary: BasicTracking
  /shipments/tracking:
    get:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "This API method enables you to retrieve the status of a shipment by providing the transportation document number. By specifying the document number in the request, you can obtain information about the current location or status of the shipment, providing clients with real-time updates on the progress of their cargo.\n\nBy default, the response contains the following data blocks:\n- Current status of the shipment;\n- Tracking history;\n- Actual tracking history;\n- Description of the shipment;\n- Extended information about related shipments.\n\nIf necessary, additional blocks can be included in the response by passing the appropriate parameters:\n\n- withUndeliveryReason = true - adds an array of objects with information about the reasons for non-delivery of shipments.\n- withCreatedOnTheBasis = true - adds an array of objects with information about returns or forwarding associated with the shipment.\n\n\U0001F538**FullTracking** provides a comprehensive tracking response\
        \ containing detailed shipment status data, full movement history, parcel descriptions, undelivery reasons, and information about related or derivative shipments. Unlike **BasicTracking**, it offers extended operational details and is designed for cases requiring full visibility into the shipment’s logistics lifecycle.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - in: query
        name: numbers[]
        description: Shipment numbers. Can accept either a single number or an array of numbers.
        schema:
          type: string
          example: SHPL1234567890
      - in: query
        name: ids[]
        description: Search shipments by transportation document ids. Accepts either a single search id or an array of ids to conduct the search.
        schema:
          type: integer
          format: int32
          example: 113622
      - in: query
        name: withUndeliveryReason
        description: 'A parameter that controls the inclusion of an array of objects containing information about non-delivery reasons in the response.

          To receive this data in the response, set the value to `true`

          '
        schema:
          type: boolean
          default: false
        required: false
        example: true
      - in: query
        name: withCreatedOnTheBasis
        description: "Parameter responsible for including in the response an array of objects containing information about related shipments (types: `Redirecting`, `Return`, `Utilization`, `Redelivery`). \nTo receive this data in the response, set the value to `true`.\n"
        schema:
          type: boolean
          default: false
        required: false
        example: true
      - in: query
        name: countryCode
        description: 'Two-letter sender country code according to the ISO 3166-1 Alpha-2 standard.

          If this parameter is specified, Tracking history and Actual tracking history will be shown only for the specified country.

          Pattern: ^[A-Z]{2}$

          '
        schema:
          type: string
          example: DE
      - in: query
        name: external
        description: 'Parameter responsible for including in the response an array of objects listing all related shipments, as well as an array containing extended information about those shipments — including the shipment owner’s name, shipment number, and shipment creation date.

          To receive this data in the response, set the value to `1`.

          '
        schema:
          type: string
          default: 0
        required: false
        example: 1
