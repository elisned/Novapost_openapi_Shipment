                            '
                          maxLength: 100
                        postCode:
                          type: string
                          description: 'The postal or ZIP code for the recipient''s address, critical for the precise sorting and routing of the parcel to its final destination.


                            **🔹This field is required if  `recipient.divisionNumber` and `recipient.divisionID` fields are missing or empty.**

                            '
                          maxLength: 10
                        building:
