openapi: 3.0.0
servers:
- description: sandbox 
  url: https://api-stage.novapost.pl/v.1.0/
- description: production
  url: https://api.novapost.com/v.1.0/
info:
  version: 1.0.0
  title: API Nova Post
  description: <p>For developers’ convenience, we have created the unified <b>Nova Post API Portal</b>, which provides a complete toolkit for fast and easy integration:</p><ul><li>🧭 <a href="https://api-portal.novapost.com/en/api-nova-post/start" target="_new"><b>Step-by-step instructions</b></a> for connecting and testing integration</li><li>🔑 <a href="https://api-portal.novapost.com/en/api-nova-post/start/api-keys" target="_new"><b>Guidelines for creating test and production API keys</b></a></li><li>🧰 <a href="https://api-portal.novapost.com/en/api-nova-post/start/api-call-tools/" target="_new"><b>Postman collection</b></a> with ready-to-use requests for API testing</li><li>📄 <a href="https://api-portal.novapost.com/en/api-methods" target="_new"><b>Additional technical documentation</b></a> — examples, request and response structures</li><li>⚡ <a href="https://api-portal.novapost.com/uk/sdk" target="_new"><b>API SDK integration with PHP projects</b></a> — overview and key benefits</li><li>💬
    <a href="https://api-portal.novapost.com/en/help-center" target="_new"><b>Developer support contacts</b></a></li><li>👉 Visit the <a href="https://api-portal.novapost.com/en/" target="_new"><b>API Portal</b></a> for full information and materials</li></ul><table><thead><tr><th>Section</th><th>Details</th></tr></thead><tbody><tr><td>Registration and Obtaining an Access Key</td><td><ul><li>Email <a href="mailto:servicedesk@novapost.com" target="_new">servicedesk@novapost.com</a> to register a user for the API.</li><li>During the registration process, you will receive an API access key. Make sure to store this information in a secure place.</li></ul></td></tr><tr><td>Authentication</td><td><ul><li>Use the received API access key to generate an access key with a lifetime of 1 hour.</li><li>Use the received access key (JWT token) for each API request.</li><li>Authenticate by including the access key in the Authorization header.</li></ul></td></tr><tr><td>Endpoint Definition</td><td><ul><li>Set
    the endpoint (URL) for accessing the API.<ul><li><a href="https://api.novapost.com/v.1.0" target="_new">https://api.novapost.com/v.1.0</a> — Production environment</li><li><a href="https://api-stage.novapost.pl/v.1.0" target="_new">https://api-stage.novapost.pl/v.1.0</a> — Test environment</li></ul></li></ul></td></tr><tr><td>Documentation Review</td><td><ul><li>Familiarize yourself with the API documentation.</li><li>Study the available methods, parameters, data formats, usage limitations, and other necessary information for successful interaction with the API.</li></ul></td></tr><tr><td>Request Creation</td><td><ul><li>Formulate your request based on the API documentation.</li><li>Specify the request method (GET, POST, PUT, DELETE, etc.), necessary parameters, and data to be sent.</li></ul></td></tr><tr><td>Response Handling</td><td><ul><li>Process the responses from the server.</li><li>Check the response status code to ensure that the request was successful.</li><li>Extract and use
    the necessary data from the API response.</li></ul></td></tr><tr><td>Error Management</td><td><ul><li>Handle possible errors and exceptional situations when working with the API.</li><li>Pay attention to the error codes and error messages provided by the API to respond appropriately.</li></ul></td></tr></tbody></table><p>It is important to remember that the exact steps and details for connecting to an API may vary depending on the specific API and platform you are working with. Make sure to follow the instructions provided by the API developers and use up-to-date documentation.</p>
components:
  securitySchemes:
    JWT:
      type: apiKey
      in: header
      name: Authorization
      description: Authorization JWT-token with a lifetime of 1 hour in header
    ApiKeyAuth:
      type: apiKey
      in: query
      name: apiKey
      description: API access key to generate an JWT-token in query
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Validation:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Time-out:
      description: Connection time-out
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        errors:
          type: object
          properties:
            ? ''
            : type: string
    TestApiKeyResponse:
      type: object
      additionalProperties: false
      required:
      - apiKey
      - createdAt
      - expDate
      - status
      properties:
        apiKey:
          type: string
          description: Test API key for Stage usage only.
          example: 99dde7bdce11414efc2f1c10ddbfd42da8ce4bf2
        createdAt:
          type: string
          format: date-time
          example: '2025-08-27T08:03:02.000000Z'
        expDate:
          type: string
          format: date-time
          example: '2026-08-29T23:59:59.000Z'
        status:
          type: string
          enum:
          - Active
          - Expired
          example: Active
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - success
      - errors
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
          example:
          - Invalid phone format
tags:
- name: Shipments
paths:
  /shipments:
    post:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "Create a Shipment Document. test test test This API method is engineered to streamline the process of generating a shipping document for logistics operations through Nova Post. By submitting key data, such as the originating and destination addresses for the shipment, users can effortlessly create a document detailing the transportation of goods. This method includes optional fields for customs authorities, accommodating shipments that cross borders. The API response will provide the unique identifier of the generated document along with other relevant information.\n\n**Settlement validation rules**: </br>\nFor shipments **to or from Moldova and Ukraine**, the settlement (city) must be successfully resolved. </br>\nIf the provided city value cannot be matched to a settlement, the request will fail with the error: `validation.condition.recipient_settlement_not_defined`.\n\nAdditional requirement:\nFor shipments that require customs clearance (imports), the client invoice must be uploaded\
        \ as a file through the [POST /shipments/uploads/{id}](https://api.novapost.com/developers/index.html#post-/shipments/uploads/-id-) method (after shipment creation).</br>\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      requestBody:
        description: Optional description in *Markdown*
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - sender
              properties:
                status:
                  type: string
                  description: "Signifies the current status of the transportation document, tracking its progress through the shipping lifecycle. Statuses detail each critical phase:\n  - Draft: The document is in its preliminary stage, not yet finalized.\n  - Accepted: Reviewed and accepted, the document is ready for the next steps.\n  - Issued: The document has been completed and is ready for shipping.\n  - ReadyToShip: Indicates that the shipment is prepared for transport following the creation of the express waybill. Only this value can be specified when creating a shipment.\n  - Deleted: The document has been deleted from the system.\n  - Returned: The shipment has been returned to its sender.\n  - Utilized: Indicates that the physical goods associated with the transportation document have been disposed of or destroyed and the document is closed.\n"
                  enum:
                  - ReadyToShip
                clientOrder:
                  type: string
                  description: Represents all potential order identifiers associated with the shipment. These identifiers are set by the customer for internal tracking purposes and are crucial for tracking the shipment throughout its journey. All entered values can be tracked in the shipment's tracking system.
                  maxLength: 50
                note:
                  type: string
                  description: Any additional information or special instructions that pertain to the order can be included here. This could encompass delivery instructions, special handling requests, or other pertinent details that facilitate the handling and processing of the shipment.
                  maxLength: 255
                deliveryType:
                  type: string
                  description: "Defines the tariff type to be applied to the shipment during creation or update. \n\n  - `standard`: Standard international delivery tariff.\n  - `economy`: Economy international delivery tariff.\n  - `express`: Express international delivery tariff.\n\nIf the field is not provided, the tariff type is determined automatically according to current business rules, and the existing shipment creation behaviour remains unchanged.\n\n**\U0001F539This field is optional.**\n"
                payerType*:
                  type: string
                  description: "Identifies who is responsible for the payment of delivery services. The payer type determines which party bears the cost:\n  - Sender: The party sending the goods pays for the delivery.\n  - Recipient: The party receiving the goods is responsible for the delivery cost.\n  - ThirdPerson: A third party, not the sender or recipient, pays for the delivery services. When selecting 'ThirdPerson', the field 'payerContractNumber' must be populated with the contract number of the paying party. For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).\nThis field is also referenced when generating an invoice.\n\n**\U0001F53BThis field is required**\n"
                  enum:
                  - Sender
                  - Recipient
                  - ThirdPerson
                payerContractNumber:
                  type: string
                  description: 'This field is required in the following cases:


                    - When the `payerType` is set to `ThirdPerson`. It must contain the payer''s contract number. For clients from Ukraine, it is also acceptable to provide the tax identification number (EDRPOU) instead of the contract number.

                    - When the `payerType` is set to `Sender` or `Recipient` and a non-cash payment method is used.


                    If this field is not provided in the cases described above, the payment method will automatically default to cash.


                    Ensure that the provided information is accurate, as it is essential for correct payment processing.


                    For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).

                    '
                  minLength: 2
                  maxLength: 20
                  nullable: true
                services:
                  type: array
                  description: Contains information about additional services for the shipment.
                  properties:
                    shipmentParcelRowNumber:
                      type: integer
                      nullable: true
                      description: 'Specifies the row number of the parcel to which the service is applied.

                        The value must correspond to the `rowNumber` of an existing parcel in the `parcels` array.


                        For services applied to the **entire shipment** (for example, `ExpBackwardGoods`), this field must be set to `null`.

                        '
                    serviceCode:
                      type: string
                      description: "The code indicating the service.\n\n**A list of available codes and descriptions of their meanings:**\n \n - `COD` — The Cash on Delivery (COD) service allows the recipient to pay for the goods directly upon receiving them, without the need for prepayment. The sender can add this service to the shipment, and the recipient has the option to pay for the goods upon delivery and inspect them before making the payment, subject to payment method restrictions established for specific countries.\n Available directions:\n\n - Poland → Ukraine\n - Czech Republic → Ukraine\n - Germany → Ukraine\n - Slovakia → Ukraine\n - Czech Republic → Czech Republic\n - Poland → Poland\n - Germany → Germany\n - Romania → Moldova\n\n\U0001F538**The COD service is planned to expand to other countries and delivery directions in the future, both for international shipments and within European countries.**\n\n- `ExpBackwardGoods` — Enables return delivery option for parent shipment\n\
                        \n- `ExpBackwardCreditDoc` — Enables return delivery of signed documents for domestic document shipments within Moldova. The service is available only for legal entities and only for shipments with the **Documents** type. The return shipment is created as a separate document delivery (by courier or operator), and the payer is always the Recipient under a non-cash contract. Not available for Parcel Locker and PUDO service channels. In the first iteration, the service is enabled only for selected legal entities.\n\n\U0001F539**This field is required for the `services` group.**\n"
                    serviceName:
                      type: string
                      description: 'Name of the service.


                        Allowed values include:

                        - `PaymentControl` — Payment control service.

                        - `MoneyTransfer` — Money transfer service.

                        - Other service types available within the `services` group.


                        🔹**This field is required within the `services` group.**

                        '
                    serviceId:
                      type: string
                      description: 'Unique identifier (reference ID) of the selected service.


                        This value must correspond to the service reference returned by the system.

                        When creating or updating a shipment, the exact `serviceId` provided in the service reference response must be copied and used without modification.


                        🔹**This field is required within the `services` group.**

                        '
                    amount:
                      type: number
                      description: 'The total amount the recipient must pay under the COD service.


                        🔹**This field is required for the `services` group.**

                        '
                    contractNumber:
                      type: string
                      nullable: true
                      description: 'Contract number of the payer responsible for the selected service.

                        This parameter is used to identify the contractual agreement under which the service is paid.


                        The field is required when the service payer is a **third party** or when non-cash payment terms are applied. If not provided, the payment may be processed according to default billing rules.

                        '
                    payerType:
                      type: string
                      description: 'Determines who is responsible for paying for the service. The payer type determines which party bears the costs:


                        - `Recipient` — The only allowed value for the COD service.

                        - `Sender`, `Recipient` — Allowed payer values for the ExpBackwardGoods service.

                        - `Sender`, `Recipient`, `ThirdPerson` — Allowed payer values for the BackwardDelGoods service.


                        **🔻This field is required**

                        '
                    additionalParameters:
                      type: string
                      description: Additional parameters for the service.
                      properties:
                        cod:
                          type: string
                          description: 'Additional parameters for configuring COD.


                            🔹**These parameters are mandatory and required only for the COD service**

                            '
                          properties:
                            bankAccount:
                              type: object
                              description: Information describing the bank account details to which the funds will be transferred. Includes the transfer amount, transaction currency, account identifiers, and the party responsible for paying the service fee.
                              properties:
                                amount:
                                  type: number
                                  description: 'The amount that will be transferred to the sender’s account after payment. Specifies the amount the recipient must pay upon receipt. Automatic currency conversion is possible depending on the sender''s or recipient''s country.


                                    🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**

                                    '
                                currencyCode:
                                  type: string
                                  description: 'The currency for the transaction, defined by the sender’s contract.

                                    Specified according to the ISO 4217 standard.


                                    🔸**By default, the currency of the sender’s country is used, but it is possible to set the currency manually (Feature under development)/**

                                    **Pattern:** ^[A-Z]{3}$

                                    '
                                bankAccountId:
                                  type: string
                                  description: 'Tax identification number of an individual or a legal entity, used for its unique identification in the system and for verifying the existence of an active contract and the availability of financial services. The same as the value passed in the `companyTin` field.


                                    🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**


                                    🔸**Must contain the tax identification number or equivalent identifier (EDRPOU, TIN, NIP).**

                                    '
                                bankAccountName:
                                  type: string
                                  description: 'IBAN


                                    🔹**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**


                                    🔸**Must contain the full account number in IBAN format.**

                                    '
                                description:
                                  type: string
                                  description: 'Additional description of the payment details.

                                    '
                                commissionPayer:
                                  type: string
                                  description: "Specifies the party responsible for paying the commission: \n\n- `Recipient`\n- `Sender`\n\n\U0001F539**This field is required for the `services.additionalParameters.cod.bankAccount` field group.**\n"
                        backwardDelivery:
                          type: array
                          description: 'Additional parameters for configuring return delivery.


                            🔹**These parameters are mandatory and required only for the ExpBackwardGoods service**

                            '
                          items:
                            type: object
                            properties:
                              description:
                                type: string
                                description: 'Description of the goods to be returned.

                                  This value is used for informational and operational purposes during the return delivery process.

                                  '
                invoice:
                  type: object
                  description: "This object presents the necessary data for customs authorities to process the consignment efficiently, including the assessment of duties and taxes, and to confirm adherence to import/export regulations. The structured format of the invoice ensures that all pertinent information is easily accessible and clear, facilitating a smoother transit across borders.\n\nUpdated logic for invoice value handling.\nClients must now send only two parameters in the invoice object:\n - `cost` — total declared value of the invoice\n - `currency` — currency code of the invoice\n\n**\U0001F538It encapsulates the invoice details, which are required for international shipments undergoing customs clearance.**\n"
                  properties:
                    customerNumber:
                      type: string
                      description: 'Unique identifier/number of the invoice accompanying the goods in the shipment, generated directly by the client. It is used for customs processing (export and import clearance) because it ensures a clear link between the goods in the shipment and their accompanying documentation, including value, origin, and other necessary information for customs clearance.


                        If a client invoice exists in the shipment but its information is missing—specifically, its number—the shipment processing in the information system will be halted, the customs clearance period will be extended, and in the worst case, customs authorities may refuse clearance and initiate a return to the country of export.

                        '
                      maxLength: 50
                      nullable: true
                    customerCreatedAt:
                      type: string
                      format: date-time
                      description: 'You must provide the date specified in the invoice accompanying the shipment.

                        If the date is not present in the client document, the shipment creation date may be used.


                        **🔹This field is required if the `invoice.customerNumber` field is filled in.**

                        '
                      pattern: ^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$
                    type:
                      type: string
                      description: 'Type of client invoice accompanying the shipment and used for customs declaration.

                        This field must reflect the actual type of document enclosed in the parcel.

                        Available values:


                        - `Invoice` — commercial invoice for shipments of a commercial nature

                        - `ProformaInvoice` — proforma invoice for shipments of a non-commercial nature


                        **🔹This field is required if the `invoice.customerNumber` field is filled in.**

                        '
                      enum:
                      - Invoice
                      - ProformaInvoice
                    incoterm:
                      type: string
                      description: "Specifies the trade terms for the shipping agreement between the buyer and seller, based on selected standards from the Incoterms® rules. These terms define the allocation of shipping costs, insurance, customs duties, and the distribution of risk. Only a limited subset of Incoterms® is available for use:\n  - DAP (Delivered at Place) - The recipient is responsible for import customs clearance, duties, and taxes.\n  - DDP (Delivered Duty Paid) - The sender is responsible for import customs clearance and for paying all applicable duties and taxes.\n\n  **\U0001F539This field is required for shipments crossing the EU border or going outside the EU.**\n"
                      enum:
                      - DAP
                      - DDP
                    exportReason:
                      type: string
                      description: "Specifies the general reason for exporting items, which is required for customs and other regulatory bodies. This classification helps in understanding the type of shipment without getting into specifics. It's used to categorize shipments at a high level for smoother processing through customs. The available options are:\n  - ForPersonalPurposes: Items are for personal use or gifts.\n  - Selling: Items are meant for sale.\n  - Repair: Items being sent for repair.\n  - Return: Items are being returned to the sender or manufacturer.\n  - Other: Any reason not covered by the other options.\n\n**\U0001F539This field is required for shipments crossing the EU border or going outside the EU.**\n"
                      enum:
                      - ForPersonalPurposes
                      - Selling
                      - Repair
                      - Return
                      - Other
                    cost:
                      type: number
                      description: 'Total declared invoice value in the original currency, which must equal the sum of all invoice items calculated as **(amount × cost)** for each item. Used for customs and shipment declarations.


                        **🔸If the provided `cost` value does not equal the sum of the `cost` values in the `items` array, it will be automatically recalculated by the system on our side.**


                        **🔸Values are validated for decimal precision, and digits beyond two decimal places are ignored.**


                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                        '
                      minimum: 0
                      maximum: 9999999.99
                    currency:
                      type: string
                      description: 'ISO 4217 currency code of the invoice. All items in the invoice must use the same currency.


                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                        '
                      pattern: ^[A-Z]{3}$
                    payerFeesCustoms:
                      type: string
                      description: "Specifies who is responsible for paying for customs services. The parameter determines which party bears the costs:\n\n  - Sender: The party sending the goods pays for the customs duties.\n  - Recipient: The party receiving the goods is responsible for the customs duties costs.\n  - ThirdPerson: A third party can only pay for customs services if this is permitted and the payer for delivery services is also a third party.\n\nThe default value is **\"Recipient\"**.</br>\nThis value will also be applied automatically if the parcel exceeds the maximum allowed value (in the recipient country’s currency) for which the sender is permitted to pay customs duties.\n\n**\U0001F539This parameter is required and valid only for the UA-EU direction.**\n"
                      enum:
                      - Sender
                      - Recipient
                      - ThirdPerson
                    items:
                      type: array
                      description: 'A detailed list of goods being shipped, including required descriptions and values, essential for customs declarations and assessing duties.


                        **Logic:** If the items block is provided, the system checks whether the total sum of all (`items.cost` × `items.amount`) matches the `invoice.cost` value. If not — the system updates `invoice.cost` to equal the sum of all items.


                        **🔸It is required to provide this information for each individual good in the shipment in the form of an array.**

                        '
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 'A unique identifier for each item within the shipment.


                              **🔹This field is optional.**

                              '
                          hsCode:
                            type: string
                            description: "The Harmonized System code for each item, a standardized numerical method of classifying traded products.\n  This field is required for international shipments that pass through customs clearance. You can obtain the valid `hsCode` from the Cargo Classifiers (UKT ZED) dictionary.\n  Validation rules:\n  - **If the sender or recipient country is Moldova (MD) or Canada (CA):**\n    - The `hsCode` must consist of exactly 10 numeric characters.\n    - If the input is longer than 10 digits, it will be **truncated** on the right.\n    - If it contains fewer than 10 digits - validation error.\n  - **For all other countries:**\n    - The `hsCode` must contain **between 8 and 10 numeric characters** (inclusive).\n    - If fewer than 8 digits – validation error.\n  - **All non-digit characters will be stripped automatically before validation.** \n  - **If the value of the `hsCode` field is `210690` or `630900`, the following conditions must be met:**\n    -\
                              \ The `measurementCode` must be set to `kg`.\n    - Each item with this `hsCode` must be unique — the invoice must not contain more than one item with code `210690` or `630900`.\n    - The amount value must not exceed 10.\n\n**\U0001F539This field is required for shipments crossing the EU border or going outside the EU.**\n"
                            maxLength: 255
                            nullable: true
                          name:
                            type: string
                            description: 'Represents the item''s name in the local language, offering an accurate description for customs and logistical planning. The name should correspond with terminologies found in the Cargo Classifiers (UKT ZED) dictionary, ensuring compliance with standard classification codes. This detailed description aids in precise item identification during the customs clearance process.

                              This field supports Unicode encoding, permitting the inclusion of special characters and symbols using the \uXXXX format. This capability allows for precise representation of item names in languages that incorporate non-Latin characters, enhancing clarity and understanding across diverse regulatory environments.


                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                              '
                            maxLength: 512
                          nameEng:
                            type: string
                            description: 'Specifies the item''s name in English, critical for ensuring that the product is identifiable and understandable across international trade and logistics channels. The English name simplifies communication and documentation processes when dealing with international partners and authorities, aiding in the seamless facilitation of global shipments.

                              Similar to the ''name'' field, this parameter also supports Unicode encoding. Using the \uXXXX format, it accommodates the accurate rendering of any special characters necessary for the correct representation of the item''s name in English.


                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                              '
                            maxLength: 512
                          material:
                            type: string
                            description: "The primary material from which the item is made, important for customs declarations and potential restrictions.\n\n **\U0001F538If this field is not provided, the default value will be applied.**\n"
                            maxLength: 50
                          materialEng:
                            type: string
                            description: 'The description of the item''s material in English, aiding in the universal understanding of the product''s composition.


                              **🔸If this field is not provided, the default value will be applied.**

                              '
                            maxLength: 255
                          madeInCountryCode:
                            type: string
                            description: 'The ISO 3166-1 alpha-2 code indicating the country of manufacture, essential for determining import duties and compliance with trade agreements.


                              **🔸This field is not required; however, shipments with this field filled are given priority during customs clearance.**

                              '
                            pattern: ^[A-Z]{2}$
                            nullable: true
                          producerAndModel:
                            type: string
                            description: "The parameter represents the manufacturer and model of the device when creating a shipment. Both values are included in a single parameter. This parameter is mandatory for the following categories:\n  - Electrical appliances\n  - Laptops\n  - Phones\n  - Large and small household appliances\n  - Other similar items\n\n**\U0001F538This field is not required; however, shipments with this field filled are given priority during customs clearance.**\n"
                            maxLength: 255
                            nullable: true
                          actualWeight:
                            type: integer
                            description: 'Actual total weight of all units of the item in grams (g).


                              Supported precision: 10 grams (0.01 kg).

                              Values not divisible by 10 g are rounded down to the nearest lower multiple of 10 g.


                              **🔸This field is mandatory when the** `invoice.items` **array is present in the request.**</br>

                              The system validates that the sum of `actualWeight` values across **all invoice items** matches the **total shipment weight** (sum of `parcels[].actualWeight`).


                              ⚠️IMPORTANT: Ensure that all invoice item weights are correctly rounded and that their total weight exactly matches the shipment weight to avoid validation errors.

                              '
                            minimum: 1
                            maximum: 2147483647
                            nullable: true
                          measurementCode:
                            type: string
                            description: 'The unit of measurement for the item quantity, such as pieces, kilograms, meters, etc., standardizing the way quantities are reported.


                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                              '
                            maxLength: 255
                          amount:
                            type: number
                            description: 'The quantity of the item being shipped, necessary for inventory and customs documentation. Value in the units of measurement corresponding to the field "measurementCode".


                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                              '
                            minimum: 0
                            maximum: 9999999.99
                          cost:
                            type: number
                            description: 'The value per single unit of the item in the sender''s currency, important for insurance and customs valuation.


                              **🔸Values are validated for decimal precision, and digits beyond two decimal places are ignored.**


                              **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                              '
                            minimum: 0
                            maximum: 9999999.99
                parcels*:
                  type: array
                  description: 'Parcels` description block. Array contains objects, each object responsible for information about parcel.


                    **🔻All fields in this array must be filled.**

                    '
                  items:
                    type: object
                    properties:
                      cargoCategory*:
                        type: string
                        description: "Specifies the type of the shipment, helping to categorize the goods for logistics and customs processing. The category impacts how the shipment is handled, its shipping cost, and the required documentation. Available categories are:\n  - parcel: Small to medium-sized packages, typically for consumer goods and retail items.\n  - documents: Postal shipments containing documents such as letters, contracts, and official papers. This category is specifically for items that weigh no more than 1 kg and have dimensions not exceeding 35 cm in length, 25 cm in width, and 2 cm in height.\n  - pallet: Type of cargo formed as a pallet shipment with fixed dimensions and weight limits, available in the Business Cabinet of Europe for legal entities:\n    - Up to 250 kg, area ~0.48 m², dimensions 80 × 60 × 170 cm\n    - Up to 500 kg, area ~0.96 m², dimensions 120 × 80 × 170 cm\n    - Up to 750 kg, area ~1.2 m², dimensions 120 × 100 × 170 cm\n    - Up to 1000 kg, area\
                          \ ~1.2 m², dimensions 120 × 100 × 170 cm\n"
                        enum:
                        - parcel
                        - documents
                        - pallet
                      parcelDescription*:
                        type: string
                        description: 'This field requires a concise description of the contents within the shipment, providing essential information on the nature of the items enclosed. This description aids in the logistics process, offering a clear understanding of the package contents for transportation planning and customs clearance. The summary should include details like the type of items, their purpose, and any other relevant information that describes the contents. It’s crucial for ensuring that the shipment complies with shipping regulations and facilitates smooth customs processing.

                          Additionally, this field supports data in Unicode encoding, allowing for the inclusion of special characters and symbols using the \uXXXX format. This feature is particularly useful for languages that use non-Latin characters, ensuring accurate representation of item descriptions across diverse linguistic contexts.

                          '
                        maxLength: 255
                      insuranceCost*:
                        type: number
                        format: float
                        description: "Represents the declared value of the shipment for insurance coverage, in the currency of the sender's country. This value indicates the maximum compensation amount in the event of damage or loss during transit. Setting this value appropriately is crucial for ensuring adequate insurance protection. It is important to accurately declare this value to match the actual worth of the shipment contents, as underdeclaring can result in insufficient compensation.\n\nThe minimum allowable value depends on the shipment direction:\n  - **UA → EU / UA → International:** the value must be greater than 0 due to mandatory invoice and insurance requirements.\n  - **EU → EU:** a value of 0 is permitted for shipments that do not require insurance coverage and for which no invoice is provided.\n"
                        minimum: 1
                        exclusiveMinimum: true
                        example: 1.5
                      rowNumber*:
                        type: integer
                        description: 'Sequential identifier for each parcel within a shipment, used to organize and track individual packages, especially when multiple items are involved. If the shipment contains only one package, the value should be 1.

                          '
                        minimum: 1
                      width*:
                        type: integer
                        description: 'The parcel''s width measured in millimeters, used alongside length and height to compute the total volume for logistical planning.

                          '
                        minimum: 1
                      length*:
                        type: integer
                        description: 'The parcel''s length measured in millimeters, used alongside height and width to compute the total volume for logistical planning.

                          '
                        minimum: 1
                      height*:
                        type: integer
                        description: 'The parcel''s height measured in millimeters, used alongside length and width to compute the total volume for logistical planning.

                          '
                        minimum: 1
                      actualWeight*:
                        type: integer
                        description: "Actual item weight in grams (g).\n\nSupported precision: 10 grams (0.01 kg).\nValues not divisible by 10 g are rounded down to the nearest lower multiple of 10 g.\n\n**\U0001F538This field is mandatory when the** `invoice.items` **array is present in the request.**</br>\nThe system validates that the sum of `actualWeight` values across **all invoice items** matches the **total shipment weight** (sum of `parcels[].actualWeight`).\n    \n⚠️IMPORTANT: Ensure that all invoice item weights are correctly rounded and that their total weight exactly matches the shipment weight to avoid validation errors.\n"
                        minimum: 1
                        maximum: 2147483647
                sender*:
                  type: object
                  description: 'Information about the party sending the shipment, including details about an individual or organization responsible for the dispatch.


                    **🔻This array of fields is required**

                    '
                  properties:
                    companyTin:
                      type: string
                      description: 'The tax identification number or equivalent identifier (EDRPOU, TIN, NIP, IČO - for Slovakia) of a legal entity.


                        **🔸The fields are required for a legal entity. If they are not filled in, the sender will be considered an individual**

                        '
                      maxLength: 20
                      nullable: true
                    companyName:
                      type: string
                      description: The official name of the sender's company. This field is used when the sender is a business entity, helping to identify the sending organization in documentation and records.
                      maxLength: 100
                      nullable: true
                    eoriCode:
                      type: string
                      description: The EORI code (Economic Operators Registration and Identification number) is used by the European Union to identify economic operators engaged in international trade. The sender's EORI code should be included in the invoice to ensure correct customs clearance and taxation when shipping goods to EU countries. The code is not mandatory but strongly recommended for international shipments to the EU, as it facilitates customs processing and helps avoid delays.
                      minLength: 3
                      maxLength: 17
                      nullable: true
                    phone*:
                      type: string
                      description: 'The contact phone number of the sender or the sender’s company representative.

                        It is required for shipment-related communication, including pickup coordination and issue resolution.

                        **Format:**

                        The phone number must be provided in **international format** according to the **E.164** standard.

                        Example: 380XXXXXXXXX, 491234567890, 371XXXXXXXX

                        **Restrictions:**

                        - The sender''s phone number must be valid and reachable in case of delivery issues.

                        - If the number is submitted in a local (non-international) format, the system will attempt to **normalize** it, but such logic is limited and may not support all variations across countries.

                        We strongly recommend implementing **front-end validation** to ensure numbers are entered in the correct international format.


                        **🔻This field is required**

                        '
                    email:
                      type: string
                      description: 'Email address of the sender, providing an electronic means of contact for updates, inquiries, and important notifications about the shipment.


                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                        '
                    name*:
                      type: string
                      description: "The full name of the individual sender or the primary contact person for a company sender. This name is used in all correspondences and documents related to the shipment.\n\n**\U0001F538Important for EU → UA international shipments:**  \nThe sender name **must be provided using Latin characters only**.\nUse of Cyrillic characters (including Ukrainian letters) is **not allowed** and will result in validation or processing errors on the Last Mile partner side.\n\n**\U0001F53BThis field is required**\n"
                      maxLength: 100
                    ioss:
                      type: string
                      description: The IOSS (Import One-Stop Shop) number is an optional input used to facilitate the VAT declaration process for shipments from non-EU countries with a declared value of up to EUR 150. It is utilized by shippers using the IOSS process to simplify customs procedures for deliveries to private customers in the EU. This field is available for shipments where the sender's country is outside the EU and the destination is within the EU.
                      maxLength: 12
                      pattern: /^[a-zA-Z0-9]*$/u
                    countryCode*:
                      type: string
                      description: 'A two-letter code representing the sender''s country, following the ISO 3166-1 Alpha-2 standard, indicating the country of origin for the shipment.


                        **🔻This field is required**

                        '
                      pattern: ^[A-Z]{2}$
                    divisionNumber:
                      type: string
                      description: 'This field is mandatory for parcels that are dispatched from a post office division or parcel locker, requiring the unique identifier of the dispatch location to be specified.


                        **🔹This field is required if both the `sender.addressParts` group and the `sender.divisionID` field are missing or empty**

                        '
                      nullable: true
                      example: 32521/1
                    divisionID:
                      type: integer
                      description: 'Division ID for specific branch identification.


                        **🔹This field is required if both the `sender.addressParts` group and the `sender.divisionNumber` field are missing or empty**

                        '
                      minimum: 1
                      nullable: true
                    addressParts:
                      type: object
                      description: 'This array of fields is required when shipping directly from an address, detailing the specific components of the location from which the parcel is dispatched. It includes detailed address information, ensuring the accurate identification of the pickup location.

                        '
                      properties:
                        city:
                          type: string
                          description: 'The name of the city from which the shipment is dispatched. It helps pinpoint the exact urban location for pickup or shipping.


                            **🔹This field is required if**  `sender.divisionNumber`  **and** `sender.divisionID` **fields are missing or empty.**</br>

                            🔸For shipments where the sender country is **Moldova** or **Ukraine**, the sender city is validated against internal settlement directories. If the settlement cannot be resolved due to an invalid or unmapped value, the shipment will not be created.

                            '
                          maxLength: 100
                        region:
                          type: string
                          description: 'Specifies the broader administrative area, like a state or province, encompassing the city, providing additional context for the shipment''s origin.


                            **🔹This field is required for shipments when the sender or recipient country is the USA, Ireland, or Canada.**

                            '
                          maxLength: 100
                        street:
                          type: string
                          description: 'Identifies the specific street address for the sender''s location, crucial for accurate pickup or delivery operations.


                            **🔹This field is required if  `sender.divisionNumber` and `sender.divisionID` fields are missing or empty.**

                            '
                          maxLength: 100
                        postCode:
                          type: string
                          description: 'The postal or ZIP code corresponding to the sender''s address. It''s essential for sorting and routing the shipment efficiently.


                            **🔹This field is required if  `sender.divisionNumber` and `sender.divisionID` fields are missing or empty.**

                            '
                          maxLength: 10
                        building:
                          type: string
                          description: 'The building number or name at the specified street address, pinpointing the precise location for shipment collection.


                            **🔹This field is required if  `sender.divisionNumber` and `sender.divisionID` fields are missing or empty.**

                            '
                          maxLength: 100
                        flat:
                          type: string
                          description: If applicable, the apartment or suite number within a building from which the shipment originates, ensuring pickup personnel can locate the sender's exact unit.
                          maxLength: 10
                        block:
                          type: string
                          description: Indicates a specific block or section within a larger residential area or complex, if relevant, aiding in locating the sender's precise starting point for the shipment.
                          maxLength: 100
                          nullable: true
                        note:
                          type: string
                          description: Allows for the inclusion of additional details or instructions about the sender's address that might facilitate the pickup process, such as gate codes, specific entry points, or preferred contact times.
                          maxLength: 100
                recipient*:
                  type: object
                  description: "Information about the party receiving the shipment, detailing either an individual or an organization responsible for receiving the dispatched goods.\n\n **\U0001F53BThis array of fields is required**\n"
                  properties:
                    companyTin:
                      type: string
                      description: 'The tax identification number or equivalent identifier (EDRPOU, TIN, NIP, IČO - for Slovakia) of a legal entity.


                        **🔸The fields are required for a legal entity. If they are not filled in, the recipient will be considered an individual**

                        '
                      maxLength: 20
                      nullable: true
                    companyName:
                      type: string
                      description: The formal name of the recipient's company. Utilize this field when the recipient is a business entity, aiding in the identification of the receiving organization in documents and records.
                      maxLength: 100
                      nullable: true
                    eoriCode:
                      type: string
                      description: 'The recipient''s EORI code is important for customs clearance when shipping goods to European Union countries, especially when sending to legal entities. The code is not mandatory but recommended, as it helps ensure smooth customs clearance and minimizes the risk of delays. The requirement for the recipient eoriCode depends on the type of goods being shipped:

                        1. Non-excise goods: The EORI code is not mandatory if non-excise goods are being shipped from Ukraine to a legal entity in Europe. If the recipient does not have an EORI code, one will be automatically assigned.

                        2. Excise goods: The EORI code is required for shipments of excise goods. The recipient must obtain an EORI code before the goods can be shipped.

                        '
                      minLength: 3
                      maxLength: 17
                      nullable: true
                    phone*:
                      type: string
                      description: "The contact phone number of the recipient or the recipient’s company representative. Used for delivery notifications and communication with the customer during shipment processing.\n**Format:** The phone number must be provided in **international format** according to the **E.164** standard.\nExample: 380XXXXXXXXX, 491234567890, 371XXXXXXXX\n**Restrictions:**\n- For deliveries to Nova Post branches in Europe, Ukrainian mobile numbers are acceptable.\n- For deliveries to **partner locations** (such as InPost, GLS, Venipak, Cargus, etc.) and **cross-border address deliveries**, the phone number must belong to a mobile operator in the recipient's country. If the phone number is submitted in a local (non-international) format, the system will attempt to **normalize** it to the international format, but the internal algorithm does not cover all possible cases. If your system does not support front-end validation of phone numbers, we recommend informing us about\
                        \ failed phone number cases so we can assess potential improvements to the normalization logic.\n          \n**\U0001F53BThis field is required**\n"
                    email:
