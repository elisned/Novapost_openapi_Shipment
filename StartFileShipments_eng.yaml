  /shipments/uploads/{id}:
    post:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "Uploads supporting documents to a specific shipment by its ID.  \nThis method is used for attaching invoices, product specifications, customs declarations, or other shipment-related documents required for processing and clearance.  \nFiles are stored and linked to the shipment, ensuring better traceability and compliance.\n\n⚠️ Region restriction:</br>\nThis method is available only for European shipments (EU/EU and EU/UA directions).</br>\nIt is not available for shipments originating from Ukraine.\n\nFile naming:  \n• If the \"fileName\" parameter is provided, the uploaded file will be stored with that name.  \n• If \"fileName\" is not provided, the default file name will be set to \"invoice\".\n\nUse cases:  \n1) \"I want to upload a client invoice in PDF to shipment 980911\" - send the base64-encoded content in \"file\", set `\"fileName\": \"invoice.pdf\"`.  \n2) \"I want to attach a product photo in JPEG\" - encode the photo in base64, set `\"fileName\": \"product-photo.jpeg\"\
        `.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - name: id
        in: path
        description: 'Unique identifier of the shipment to which the files are attached.</br>

          This value represents the `shipmentId` of the European system.</br>

          Using a Ukrainian shipment number will result in a validation error.

          '
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        description: JSON body containing the base64-encoded file and optional file name.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Base64-encoded document file (PDF, JPEG, or other supported formats).
                fileName:
                  type: string
                  description: Optional file name. Defaults to "invoice" if not provided.
            examples:
              jpegFile:
                summary: Example of JPEG upload
                value:
                  file: /9j/4AAQSkZJRgABAQEAYABgAAD... (base64 content truncated)
                  fileName: product-photo.jpeg
              pdfFile:
                summary: Example of PDF upload
                value:
                  file: JVBERi0xLjMKJcTl8uXr... (base64 content truncated)
                  fileName: invoice.pdf
      responses:
        '201':
          description: File upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the file upload was successful.
              example:
                success: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Validation'
        '503':
          $ref: '#/components/responses/Time-out'
      summary: Shipments uploads file
  /shipments/print:
    get:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "This API method allows you to retrieve a transportation document marking in PDF format by providing the document number. The document marking is a printable document that clients can attach or affix to their cargo when sending it. By specifying the document number in the request, you can generate a PDF file containing the document marking for easy\nprinting.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - in: query
        name: numbers[]
        description: Shipment numbers. Can accept either a single number or an array of numbers. When `type=marking` is used, only one number is allowed per request.
        schema:
          type: string
          example: SHPL1234567890
      - in: query
        name: type
        description: 'Type of document to be printed.

          - `marking`: for shipment label 100x100 (local or international)

          - `international`: for customs declaration/invoice

          - `invoice`: for commercial invoice

          '
        schema:
          type: array
          items:
            type: string
            enum:
            - marking
            - international
            - invoice
      - in: query
        name: printSizeType
        description: "Selection of document size. \n- For `type=marking` only `size_100_100` is supported.\n"
        schema:
          type: array
          items:
            type: string
            enum:
            - size_100_100
            - size_A4
      - in: query
        name: deliveryType
        description: 'Type of delivery flow for marking document printing. Applicable only for `type=marking`.

          - `Pickup`: first mile

          - `Shipment`: last mile

          '
        required: false
        schema:
          type: string
          enum:
          - Pickup
          - Shipment
      responses:
        '200':
          description: A PDF file.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Validation'
        '503':
          $ref: '#/components/responses/Time-out'
      summary: Print Shipment Documents
  /shipments/tracking/history:
