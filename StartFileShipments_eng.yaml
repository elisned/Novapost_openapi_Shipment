  /shipments/{shipmentNumber}/attachments:
    get:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "Returns a list of available shipment-related attachment files (photos and/or signature) for the specified shipment **only if the shipment belongs to the authenticated client**.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - in: path
        name: shipmentNumber
        required: true
        description: Shipment`s numbers.
        schema:
          type: string
          example: SHDE2072834273
      responses:
        '200':
          description: Metadata structure
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    shipmentId:
                      type: integer
                      description: Internal ID of the shipment
                    storageInfo:
                      type: object
                      description: Contains information about the file.
                      properties:
                        id:
                          type: string
                          description: Unique file identifier {fileId} of the stored file
                        name:
                          type: string
                          description: File name.
                        documentType:
                          type: string
                          description: "Type of the document: \n\n- Signature\n- ProofOfDelivery\n"
                    createdAt:
                      type: string
                      description: Date and time when the file was uploaded. Date in ISO 8601 format.
              example:
              - shipmentId: 279708
                storageInfo:
                  id: c0da6fe9-997b-4f8d-b798-0150e50a6655
                  name: string (11).png
                  documentType: signature
                createdAt: '2025-07-29T14:07:30.135738Z'
              - shipmentId: 279708
                storageInfo:
                  id: da2dc99f-c7e9-478d-9597-9ccca38f6bdb
                  name: IMG_8034.JPG.png
                  documentType: proofOfDelivery
                createdAt: '2025-07-29T14:08:16.476107Z'
              - shipmentId: 279708
                storageInfo:
                  id: 038a5340-f2a1-4982-a88b-8ad01b80bd81
                  name: IMG_7298.JPG.png
                  documentType: proofOfDelivery
                createdAt: '2025-07-29T14:07:30.135738Z'
              - shipmentId: 279708
                storageInfo:
                  id: 257f5a42-1c0f-48aa-9805-0af3a757b863
                  name: IMG_8000.JPG.png
                  documentType: proofOfDelivery
                  createdAt: '2025-07-29T14:07:30.135738Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Possible Error Responses
          content:
            application/json:
              examples:
                unauthorized:
                  summary: User is not authorized to access the shipment
                  value:
                    error: You are not authorized to access this shipment
                notFound:
                  summary: Shipment does not exist
                  value:
                    error: Shipment not found
                noAttachments:
                  summary: Shipment exists but has no attachments
                  value:
                    error: No attachments found for the specified shipment
        '503':
          $ref: '#/components/responses/Time-out'
      summary: List attachments
  /shipments/{shipmentNumber}/attachments/{fileId}:
    get:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "Returns the **stream of the file** specified by fileId, if the shipment belongs to the authenticated client.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - in: path
        name: shipmentNumber
        required: true
        description: Shipment`s numbers.
        schema:
          type: string
          example: SHDE2072834273
      - in: path
        name: fileId
        required: true
        description: Unique file identifier.
        schema:
          type: string
          example: 60946ff4-8170-415b-ab66-719848ef1da7
      responses:
        '200':
          description: A file.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              example:
                error: You are not authorized to access this shipment
        '503':
          $ref: '#/components/responses/Time-out'
      summary: Download attachment
