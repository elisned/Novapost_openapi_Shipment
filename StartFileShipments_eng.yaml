                          description: 'Specifies the recipient''s state or province within the destination country, crucial for accurate shipment routing and delivery. When sending to the USA, it''s essential to include a two-letter state code, such as "WA" for Washington or "DC" for the District of Columbia, according to the ISO 3166-2:US standard.


