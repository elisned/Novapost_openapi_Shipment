      summary: Create Shipment
    get:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "This API method enables you to retrieve a list of transportation documents (shipments) that you have created. By making a request with this method, you can access the transportation documents that belongs to you or your account. The response will include details of each shipment, such as the shipment ID, number, recipient, cargo detail, and other relevant information.</br>\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - in: query
        name: numbers[]
        description: Search shipments by transportation document number. Can accept either a single search number or an array of numbers for conducting the search.
        schema:
          type: string
          example: SHPL6145344878
      - in: query
        name: ids[]
        description: Search shipments by transportation document ids.
        schema:
          type: integer
          format: int32
          example: 113622
      - in: query
        name: limit
        description: Max number of items to return on page.
        schema:
          type: integer
          format: int32
          example: 1
          default: 15
      - in: query
        name: page
        description: Number of page to return.
        schema:
          type: integer
          format: int32
          example: 1
      - in: query
        name: inRegistry
        description: Flag showing whether the shipment is included in the registry. Only for European parcels.
        schema:
          type: boolean
          example: true
      - in: query
        name: registerNumber
        description: Number of the register that lists all shipments in the registry. Only for European parcels.
        schema:
          type: string
          example: CRPL0000004855
      - in: query
        name: senderDivisionId
        description: DivisionId of the shipment sender.
        schema:
          type: integer
          minimum: 1
          example: 12
      responses:
        '200':
          description: shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_page:
                    type: integer
                    description: Current page.
                    minimum: 1
                  last_page:
                    type: integer
                    description: Total pages found.
                    minimum: 1
                  per_page:
                    type: integer
                    description: Current objects` limit for a single page.
                    minimum: 1
                  total:
                    type: integer
                    description: Total objects found.
                    minimum: 0
                  from:
                    type: integer
                    nullable: true
                  to:
                    type: integer
                    nullable: true
                  items:
                    type: array
                    description: Items` information in the invoice.
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: A unique identifier assigned to each shipment, facilitating internal operations such as modifications, system searches, and deletion of shipments. The 'id' serves as a key reference for administrative and logistical processes within the delivery system, allowing precise access and management of shipment records.
                          minimum: 1
                        version:
                          type: integer
                          description: Version of the document, each change of the document is +1.
                        number:
                          type: string
                          description: Transportation document number.
                          pattern: ^[A-Z]{4}\d{10}$
                        dateTime:
                          type: string
                          description: Document creation datetime.
                        scheduledDeliveryDate:
                          type: string
                          description: Scheduled delivery date.
                          nullable: true
                        closingDate:
                          type: string
                          description: Document closing date. Displayed after successful delivery.
                          nullable: true
                        createdAt:
                          type: string
                          description: Datetime of creation.
                        updatedAt:
                          type: string
                          description: Datetime of update.
                        deletedAt:
                          type: string
                          description: Datetime if removed, otherwise is null.
                          nullable: true
                        userCreate:
                          type: string
                          description: Internal data, not for use.
                        status:
                          type: string
                          description: The actual status of the document (e.g. ReadyToShip, Accepted, Issued, Draft, Deleted).
                        gtid:
                          type: string
                          description: Internal data, not for use.
                        paymentStatus:
                          type: string
                          description: Status of payment for delivery services (e.g. Paid, NeedPay, ContractAfterPayment).
                        currencyCode:
                          type: string
                          description: Currency code according to the conditions of the payer contract, according to iso-4217 standard.
                        parcelsAmount:
                          type: integer
                          description: Amount of objects in parcels.
                          minimum: 1
                        clientOrder:
                          type: string
                          description: Represents all potential order identifiers associated with the shipment. These identifiers are set by the customer for internal tracking purposes and are crucial for tracking the shipment throughout its journey. All entered values can be tracked in the shipment's tracking system.
                          maxLength: 50
                        note:
                          type: string
                          description: Any additional information or special instructions that pertain to the order can be included here. This could encompass delivery instructions, special handling requests, or other pertinent details that facilitate the handling and processing of the shipment.
                          maxLength: 255
                        payerType:
                          type: string
                          description: Information about who pays for delivery (e.g. Sender, Recipient, ThirdPerson).
                        payerContractId:
                          type: integer
                          description: ID number of a person or organization that pays for delivery.
                          nullable: true
                        payerContractNumber:
                          type: string
                          description: Contains the contract number if "payerType" is set to "ThirdPerson". Also this field can can contain the contract number of a sender as the payer when non-cash transactions are used.
