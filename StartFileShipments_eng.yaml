                          description: Version of the shipment data for concurrency control
                        additional_parameters:
                          type: object
                          description: This object holds a variety of supplementary details  that provide critical information for ensuring accurate processing and delivery of the shipment.
                          properties:
                            cod:
                              type: number
                              description: Cash on delivery amount, if applicable. This specifies the amount to be collected upon delivery, which is crucial for transactions requiring payment at the time of delivery.
                              nullable: true
                            date:
                              type: integer
                              description: The estimated date of delivery, calculated based on the logistics and routing information. If the route's delivery date cannot be calculated due to insufficient data in the chosen direction, this field may hold a zero value.
                              nullable: true
                            from:
                              type: integer
                              description: Represents the estimated start time of the delivery window. This field can be zero if there is not enough information to determine a starting time for the delivery.
                              nullable: true
                            to:
                              type: integer
                              description: Represents the estimated end time of the delivery window. Similar to the 'from' parameter, this field can also be zero if there is insufficient data to define an ending time for delivery.
                              nullable: true
                            string:
                              type: integer
                              description: Represents the cargo category as specified in the cargoCategory parameter. This can include values such as 'Parcel', 'Documents', 'Cargo', or 'Pallet' reflecting the type of items being shipped.
                              nullable: true
                            fullName:
                              type: integer
                              description: The full name of the recipient. This is used to ensure that the delivery is addressed to the correct individual, essential for verification upon delivery.
                              nullable: true
                            phone:
                              type: integer
                              description: 'The contact phone number of the recipient or the recipient’s company representative. Used for delivery notifications and communication with the customer during shipment processing.

                                **Format:** The phone number must be provided in **international format** according to the **E.164** standard.

                                Example: 380XXXXXXXXX, 491234567890, 371XXXXXXXX

                                **Restrictions:**

                                - For deliveries to Nova Post branches in Europe, Ukrainian mobile numbers are acceptable.

                                - For deliveries to **partner locations** (such as InPost, GLS, Venipak, Cargus, etc.) and **cross-border address deliveries**, the phone number must belong to a mobile operator in the recipient''s country. If the phone number is submitted in a local (non-international) format, the system will attempt to **normalize** it to the international format, but the internal algorithm does not cover all possible cases. If your system does not support front-end validation of phone numbers, we recommend informing us about failed phone number cases so we can assess potential improvements to the normalization logic.

                                '
                              nullable: true
                        createdAt:
                          type: string
                          format: date-time
                          description: The date-time indicating when the record was initially created, formatted in ISO 8601 standard.
                        updatedAt:
                          type: string
                          format: date-time
                          description: The date-time indicating the last update made to the record, formatted in ISO 8601 standard.
                        deliveryType:
