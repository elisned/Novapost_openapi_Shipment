      summary: Calculate delivery cost
  /shipments/{id}:
    put:
      security:
      - JWT: []
      tags:
      - Shipments
      description: "This API method enables you to update an existing transportation document by providing the document ID and the complete set of updated data. By specifying the document ID and including all the necessary information, you can replace the old document with the new data provided in the request. The response will typically indicate the success of the update operation and may include details of the modified document.\n\nUpdate restrictions:\n- Shipment data can be updated **only while the shipment is in the `ReadyToShip` status**.\n- Updates are allowed **only if the shipment label has not been printed**.\n- If the shipment is not in the `ReadyToShip` status or the shipment label has already been printed, the update request will be rejected with a validation error.\n\n\U0001F539**Description of control elements:**\n\n**SCHEMA**</br>\nDisplays the full technical structure of the request or response, including field names, data types, required fields, allowed values, and validation\
        \ rules.\n- **Single line description**</br>\n  A description that fits into a single line; any text that does not fit remains hidden.\n- **Multiline description**</br>\n  An expanded description that displays more than one line of text.\n\n**EXAMPLE**</br>\nShows a ready-made sample JSON with correctly formatted values to demonstrate how a valid request or response should look.\n"
      parameters:
      - name: id
        in: path
        description: Transportation document id.
        required: true
        schema:
          type: integer
          format: int32
          example: 113677
      requestBody:
        description: Optional description in *Markdown*
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: "Signifies the current status of the transportation document, tracking its progress through the shipping lifecycle. Statuses detail each critical phase:\n  - Draft: The document is in its preliminary stage, not yet finalized.\n  - Accepted: Reviewed and accepted, the document is ready for the next steps.\n  - Issued: The document has been completed and is ready for shipping.\n  - ReadyToShip: Indicates that the shipment is prepared for transport following the creation of the express waybill. Only this value can be specified when creating a shipment.\n  - Deleted: The document has been deleted from the system.\n  - Returned: The shipment has been returned to its sender.\n  - Utilized: Indicates that the physical goods associated with the transportation document have been disposed of or destroyed and the document is closed.\n"
                  enum:
                  - ReadyToShip
                clientOrder:
                  type: string
                  description: Represents all potential order identifiers associated with the shipment. These identifiers are set by the customer for internal tracking purposes and are crucial for tracking the shipment throughout its journey. All entered values can be tracked in the shipment's tracking system.
                  maxLength: 50
                note:
                  type: string
                  description: Any additional information or special instructions that pertain to the order can be included here. This could encompass delivery instructions, special handling requests, or other pertinent details that facilitate the handling and processing of the shipment.
                  maxLength: 255
                deliveryType:
                  type: string
                  description: "Defines the tariff type to be applied to the shipment during creation or update. \n\n  - `standard`: Standard international delivery tariff.\n  - `economy`: Economy international delivery tariff.\n  - `express`: Express international delivery tariff.\n\nIf the field is not provided, the tariff type is determined automatically according to current business rules, and the existing shipment update behaviour remains unchanged.\n\n**\U0001F539This field is optional.**\n"
                payerType:
                  type: string
                  description: "Identifies who is responsible for the payment of delivery services. The payer type determines which party bears the cost:\n  - Sender: The party sending the goods pays for the delivery.\n  - Recipient: The party receiving the goods is responsible for the delivery cost.\n  - ThirdPerson: A third party, not the sender or recipient, pays for the delivery services. When selecting 'ThirdPerson', the field 'payerContractNumber' must be populated with the contract number of the paying party. For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).\n"
                  enum:
                  - Sender
                  - Recipient
                  - ThirdPerson
                payerContractNumber:
                  type: string
                  description: This field is required when the 'payerType' is set to 'ThirdPerson'. It should contain the contract number. For clients from Ukraine, it is also acceptable to provide the tax identification number (EDRPOU) instead of the contract number. Additionally, this field must be completed for the sender as the payer when non-cash transactions are used. Failure to provide this information will default the payment method to cash. Ensure the information is accurate, as it is essential for processing the payment. For more detailed information, refer to the article on [Payment for Delivery Services via Nova Post API](https://api-portal.novapost.com/en/api-methods/payment/).
                  minLength: 2
                  maxLength: 20
                  nullable: true
                invoice:
                  type: object
                  description: This object encapsulates the invoice details crucial for international shipments undergoing customs clearance. It presents the necessary data for customs authorities to process the consignment efficiently, including the assessment of duties and taxes, and to confirm adherence to import/export regulations. The structured format of the invoice ensures that all pertinent information is easily accessible and clear, facilitating a smoother transit across borders.
                  properties:
                    customerNumber:
                      type: string
                      description: 'Unique identifier/number of the invoice accompanying the goods in the shipment, generated directly by the client. It is used for customs processing (export and import clearance) because it ensures a clear link between the goods in the shipment and their accompanying documentation, including value, origin, and other necessary information for customs clearance.


                        If a client invoice exists in the shipment but its information is missing—specifically, its number—the shipment processing in the information system will be halted, the customs clearance period will be extended, and in the worst case, customs authorities may refuse clearance and initiate a return to the country of export.

                        '
                      maxLength: 50
                      nullable: true
                    customerCreatedAt:
                      type: string
                      format: date-time
                      description: 'You must provide the date specified in the invoice accompanying the shipment.

                        If the date is not present in the client document, the shipment creation date may be used.


                        **🔹This field is required if the `invoice.customerNumber` field is filled in.**

                        '
                      pattern: ^20[0-9]{2}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}.[0-9]{6}Z$
                    type:
                      type: string
                      description: 'Type of client invoice accompanying the shipment and used for customs declaration.

                        This field must reflect the actual type of document enclosed in the parcel.

                        Available values:


                        - `Invoice` — commercial invoice for shipments of a commercial nature

                        - `ProformaInvoice` — proforma invoice for shipments of a non-commercial nature


                        **🔹This field is required if the `invoice.customerNumber` field is filled in.**

                        '
                      enum:
                      - Invoice
                      - ProformaInvoice
                    incoterm:
                      type: string
                      description: "Specifies the trade terms for the shipping agreement between the buyer and seller, based on selected standards from the Incoterms® rules. These terms define the allocation of shipping costs, insurance, customs duties, and the distribution of risk. Only a limited subset of Incoterms® is available for use:\n  - DAP: Delivered at Place\n"
                      enum:
                      - DAP
                    exportReason:
                      type: string
                      description: "Specifies the general reason for exporting items, which is required for customs and other regulatory bodies. This classification helps in understanding the type of shipment without getting into specifics. It's used to categorize shipments at a high level for smoother processing through customs. The available options are:\n  - ForPersonalPurposes: Items are for personal use or gifts.\n  - Selling: Items are meant for sale.\n  - Repair: Items being sent for repair.\n  - Return: Items are being returned to the sender or manufacturer.\n  - Other: Any reason not covered by the other options.\n"
                      enum:
                      - ForPersonalPurposes
                      - Selling
                      - Repair
                      - Return
                      - Other
                    cost:
                      type: number
                      description: 'Total declared invoice value in the original currency. Used for customs and shipment declarations.


                        **🔸Values are validated for decimal precision, and digits beyond two decimal places are ignored.**


                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                        '
                      minimum: 0
                      maximum: 9999999.99
                    currency:
                      type: string
                      description: 'ISO 4217 currency code of the invoice. All items in the invoice must use the same currency.


                        **🔹This field is required for shipments crossing the EU border or going outside the EU.**

                        '
                      pattern: ^[A-Z]{3}$
                    payerFeesCustoms:
                      type: string
                      description: "Specifies who is responsible for paying for customs services. The parameter determines which party bears the costs:\n\n  - Sender: The party sending the goods pays for the customs duties.\n  - Recipient: The party receiving the goods is responsible for the customs duties costs.\n  - ThirdPerson: A third party can only pay for customs services if this is permitted and the payer for delivery services is also a third party.\n\nThe default value is **\"Recipient\"**.</br>\nThis value will also be applied automatically if the parcel exceeds the maximum allowed value (in the recipient country’s currency) for which the sender is permitted to pay customs duties.\n\n**\U0001F539This parameter is required and valid only for the UA-EU direction.**\n"
                      enum:
                      - Sender
                      - Recipient
                      - ThirdPerson
                    items:
                      type: array
                      description: A detailed list of goods being shipped, including descriptions and values, essential for customs declarations and assessing duties.
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            description: A unique identifier for each item within the shipment.
                          hsCode:
                            type: string
                            description: "The Harmonized System code for each item, a standardized numerical method of classifying traded products.\n  This field is required for international shipments that pass through customs clearance. You can obtain the valid `hsCode` from the Cargo Classifiers (UKT ZED) dictionary.\n  Validation rules:\n  - **If the sender or recipient country is Moldova (MD) or Canada (CA):**\n    - The `hsCode` must consist of exactly 10 numeric characters.\n    - If the input is longer than 10 digits, it will be **truncated** on the right.\n    - If it contains fewer than 10 digits - validation error.\n  - **For all other countries:**\n    - The `hsCode` must contain **between 8 and 10 numeric characters** (inclusive).\n    - If fewer than 8 digits – validation error.\n  - **All non-digit characters will be stripped automatically before validation.** \n  - **If the value of the `hsCode` field is `210690` or `630900`, the following conditions must be met:**\n    -\
                              \ The `measurementCode` must be set to `kg`.\n    - Each item with this `hsCode` must be unique — the invoice must not contain more than one item with code `210690` or `630900`.\n    - The amount value must not exceed 10.\n\n**\U0001F539This field is required for shipments crossing the EU border or going outside the EU.**\n"
                            maxLength: 255
                            nullable: true
                          name:
                            type: string
                            description: 'Represents the item''s name in the local language, offering an accurate description for customs and logistical planning. The name should correspond with terminologies found in the Cargo Classifiers (UKT ZED) dictionary, ensuring compliance with standard classification codes. This detailed description aids in precise item identification during the customs clearance process.

                              This field supports Unicode encoding, permitting the inclusion of special characters and symbols using the \uXXXX format. This capability allows for precise representation of item names in languages that incorporate non-Latin characters, enhancing clarity and understanding across diverse regulatory environments.

                              '
                            maxLength: 512
                          nameEng:
                            type: string
                            description: 'Specifies the item''s name in English, critical for ensuring that the product is identifiable and understandable across international trade and logistics channels. The English name simplifies communication and documentation processes when dealing with international partners and authorities, aiding in the seamless facilitation of global shipments.

                              Similar to the ''name'' field, this parameter also supports Unicode encoding. Using the \uXXXX format, it accommodates the accurate rendering of any special characters necessary for the correct representation of the item''s name in English.

                              '
                            maxLength: 512
                          materialEng:
                            type: string
                            description: The description of the item's material in English, aiding in the universal understanding of the product's composition.
                            maxLength: 255
                          madeInCountryCode:
                            type: string
                            description: The ISO 3166-1 alpha-2 code indicating the country of manufacture, essential for determining import duties and compliance with trade agreements.
                            pattern: ^[A-Z]{2}$
                            nullable: true
                          producerAndModel:
                            type: string
                            description: "The parameter represents the manufacturer and model of the device when creating a shipment. Both values are included in a single parameter. This parameter is mandatory for the following categories:\n  - Electrical appliances\n  - Laptops\n  - Phones\n  - Large and small household appliances\n  - Other similar items\n"
                            maxLength: 255
                            nullable: true
                          actualWeight:
                            type: integer
                            description: 'Actual total weight of all units of the item in grams (g), crucial for calculating shipping costs and ensuring the shipment complies with carrier limitations.

                              Expected unit: grams (g)

                              Only precision up to 10 grams (0.01 kg) is supported. Values not divisible by 10 g will be rounded down to the nearest lower multiple of 10 g.


                              ⚠️IMPORTANT: Please round weight values to the nearest 10 g before sending, to avoid unexpected adjustments.

                              '
                            minimum: 1
                            maximum: 2147483647
                            nullable: true
                          measurementCode:
                            type: string
                            description: The unit of measurement for the item quantity, such as pieces, kilograms, meters, etc., standardizing the way quantities are reported.
                            maxLength: 255
                          amount:
                            type: number
                            description: The quantity of the item being shipped, necessary for inventory and customs documentation. Value in the units of measurement corresponding to the field "measurementCode".
                            minimum: 0
                            maximum: 9999999.99
                          cost:
                            type: number
                            description: 'The value per single unit of the item in the sender''s currency, important for insurance and customs valuation.


                              **🔸Values are validated for decimal precision, and digits beyond two decimal places are ignored.**

                              '
                            minimum: 0
                            maximum: 9999999.99
                services:
                  type: array
                  description: Contains information about additional services for the shipment.
                  properties:
                    shipmentParcelRowNumber:
                      type: integer
                      nullable: true
                      description: 'Specifies the row number of the parcel to which the service is applied.

                        The value must correspond to the `rowNumber` of an existing parcel in the `parcels` array.


                        For services applied to the **entire shipment** (for example, `ExpBackwardGoods`), this field must be set to `null`.

                        '
                    serviceCode:
                      type: string
                      description: 'The code indicating the service.


                        **A list of available codes and descriptions of their meanings:**

                        - `ExpBackwardGoods` — enables return delivery option for parent shipment

                        - `BackwardDelGoods` — confirms return delivery in child shipment


                        - `ExpBackwardCreditDoc` — Enables return delivery of signed documents for domestic document shipments within Moldova. The service is available only for legal entities and only for shipments with the “Documents” type. The return shipment is created as a separate document delivery (by courier or operator), and the payer is always the Recipient under a non-cash contract. Not available for Parcel Locker and PUDO service channels. In the first iteration, the service is enabled only for selected legal entities.


                        🔹**This field is required for the `services` group.**

                        '
                    amount:
                      type: number
                      description: 'The total amount the recipient must pay under the COD service.


                        🔹**This field is required for the `services` group.**

                        '
                    contractNumber:
                      type: string
                      nullable: true
                      description: 'Contract number of the payer responsible for the selected service.

                        This parameter is used to identify the contractual agreement under which the service is paid.


                        The field is required when the service payer is a **third party** or when non-cash payment terms are applied. If not provided, the payment may be processed according to default billing rules.

                        '
                    payerType:
                      type: string
                      description: 'Determines who is responsible for paying for the service. The payer type determines which party bears the costs:


                        - `Recipient` — The only allowed value for the COD service.

                        - `Sender`, `Recipient` — Allowed payer values for the ExpBackwardGoods service.

                        - `Sender`, `Recipient`, `ThirdPerson` — Allowed payer values for the BackwardDelGoods service.


                        🔹**This field is required for the `services` group.**

                        '
                    additionalParameters:
                      type: string
                      description: Additional parameters for the service.
                      properties:
                        backwardDelivery:
                          type: array
                          description: 'Additional parameters for configuring return delivery.


                            🔹**These parameters are mandatory and required only for the ExpBackwardGoods service**

                            '
                          items:
                            type: object
                            properties:
                              description:
                                type: string
                                description: 'Description of the goods to be returned.

                                  This value is used for informational and operational purposes during the return delivery process.

                                  '
                parcels:
                  type: array
                  description: Parcels` description block. Array contains objects, each object responsible for information about parcel.
                  items:
                    type: object
                    properties:
                      cargoCategory:
                        type: string
                        description: "Specifies the type of the shipment, helping to categorize the goods for logistics and customs processing. The category impacts how the shipment is handled, its shipping cost, and the required documentation. Available categories are:\n  - parcel: Small to medium-sized packages, typically for consumer goods and retail items.\n  - documents: Postal shipments containing documents such as letters, contracts, and official papers. This category is specifically for items that weigh no more than 1 kg and have dimensions not exceeding 35 cm in length, 25 cm in width, and 2 cm in height.\n  - cargo: Larger and bulk items, including pallets or containers, meant for commercial shipping and large-scale transport.\n  - pallet: Type of cargo formed as a pallet shipment with fixed dimensions and weight limits, available in the Business Cabinet of Europe for legal entities:\n    - Up to 250 kg, area ~0.48 m², dimensions 80 × 60 × 170 cm\n    - Up to 500 kg, area ~0.96\
                          \ m², dimensions 120 × 80 × 170 cm\n    - Up to 750 kg, area ~1.2 m², dimensions 120 × 100 × 170 cm\n    - Up to 1000 kg, area ~1.2 m², dimensions 120 × 100 × 170 cm\n"
                        enum:
                        - parcel
                        - documents
                        - cargo
                        - pallet
                      parcelDescription:
                        type: string
                        description: 'This field requires a concise description of the contents within the shipment, providing essential information on the nature of the items enclosed. This description aids in the logistics process, offering a clear understanding of the package contents for transportation planning and customs clearance. The summary should include details like the type of items, their purpose, and any other relevant information that describes the contents. It’s crucial for ensuring that the shipment complies with shipping regulations and facilitates smooth customs processing.

                          Additionally, this field supports data in Unicode encoding, allowing for the inclusion of special characters and symbols using the \uXXXX format. This feature is particularly useful for languages that use non-Latin characters, ensuring accurate representation of item descriptions across diverse linguistic contexts.

                          '
                        maxLength: 255
                      insuranceCost:
                        type: number
                        description: "Represents the declared value of the shipment for insurance coverage, in the currency of the sender's country. This value indicates the maximum compensation amount in the event of damage or loss during transit. Setting this value appropriately is crucial for ensuring adequate insurance protection. It is important to accurately declare this value to match the actual worth of the shipment contents, as underdeclaring can result in insufficient compensation.\n\nThe minimum allowable value depends on the shipment direction:\n  - **UA → EU / UA → International:** the value must be greater than 0 due to mandatory invoice and insurance requirements.\n  - **EU → EU:** a value of 0 is permitted for shipments that do not require insurance coverage and no invoice is provided.\n"
                        minimum: 1
                        exclusiveMinimum: true
                        example: 1.5
                      rowNumber:
                        type: integer
                        description: Sequential identifier for each parcel within a shipment, used to organize and track individual packages, especially when multiple items are involved. If the shipment contains only one package, the value should be 1.
                        minimum: 1
                      untied:
                        type: boolean
                        description: 'Allows cancellation of individual parcels within a multiparcel shipment before the shipment reaches the **Accepted** status. To cancel one parcel, the merchant must include the full array of all parcels in the update request and set the parameter `untied: true` for the parcel to be cancelled.


                          ⚠️IMPORTANT:

                          - The first parcel (`rowNumber: 1`) cannot be detached. If it contains an error, the entire shipment must be cancelled and recreated.

                          - When `untied` is used for **one parcel**, it must be included for **all parcels** in the request.

                          - If a non-existent `rowNumber` is marked as `untied: true`, the system will return the error: `Impossible to delete a non-existent parcel`.

                          - If not all parcels are provided in the request, the system will return: `Required parcel [rowNumber] is missing.`

                          '
                      width:
                        type: integer
                        description: The parcel's width measured in millimeters, used alongside length and height to compute the total volume for logistical planning.
                        minimum: 1
                      length:
                        type: integer
                        description: The parcel's length measured in millimeters, used alongside height and width to compute the total volume for logistical planning.
                        minimum: 1
                      height:
                        type: integer
                        description: The parcel's height measured in millimeters, used alongside length and width to compute the total volume for logistical planning.
                        minimum: 1
                      actualWeight:
                        type: integer
                        description: 'Actual total weight of all units of the item in grams (g), critical for shipping cost calculations and compliance with carrier weight limits.

                          Expected unit: grams (g)

                          Only precision up to 10 grams (0.01 kg) is supported. Values not divisible by 10 g will be rounded down to the nearest lower multiple of 10 g.


                          ⚠️IMPORTANT: Please round weight values to the nearest 10 g before sending, to avoid unexpected adjustments.

                          '
                        minimum: 1
                        maximum: 2147483647
                sender:
                  type: object
                  description: Information about the party sending the shipment, including details about an individual or organization responsible for the dispatch.
                  properties:
                    companyTin:
                      type: string
                      description: "The tax identification number or equivalent identifier (EDRPOU, TIN, NIP, IČO) of a legal entity. \n\n\U0001F539**Required for legal and customs documentation when the sender is a legal entity.**\n"
                      maxLength: 20
                      nullable: true
                    companyName:
                      type: string
                      description: The official name of the sender's company. This field is used when the sender is a business entity, helping to identify the sending organization in documentation and records.
                      maxLength: 100
                      nullable: true
                    eoriCode:
                      type: string
                      description: The EORI code (Economic Operators Registration and Identification number) is used by the European Union to identify economic operators engaged in international trade. The sender's EORI code should be included in the invoice to ensure correct customs clearance and taxation when shipping goods to EU countries. The code is not mandatory but strongly recommended for international shipments to the EU, as it facilitates customs processing and helps avoid delays.
                      minLength: 3
                      maxLength: 17
                      nullable: true
                    phone:
                      type: string
                      description: 'The contact phone number of the sender or the sender’s company representative.

                        It is required for shipment-related communication, including pickup coordination and issue resolution.

                        **Format:**

                        The phone number must be provided in **international format** according to the **E.164** standard.

                        Example: 380XXXXXXXXX, 491234567890, 371XXXXXXXX

                        **Restrictions:**

                        - The sender''s phone number must be valid and reachable in case of delivery issues.

                        - If the number is submitted in a local (non-international) format, the system will attempt to **normalize** it, but such logic is limited and may not support all variations across countries.

                        We strongly recommend implementing **front-end validation** to ensure numbers are entered in the correct international format.

                        '
                    email:
